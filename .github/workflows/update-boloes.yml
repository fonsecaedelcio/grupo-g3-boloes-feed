name: Atualizar vitrines de bolões

on:
  workflow_dispatch:
  schedule:
    - cron: "7,17,27,37,47,57 * * * *"

permissions:
  contents: write

concurrency:
  group: atualizar-boloes
  cancel-in-progress: false

jobs:
  atualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Baixar o coletor
        uses: actions/checkout@v4
      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Consultar as três vitrines
        run: node scripts/collect-boloes.mjs
      - name: Publicar somente uma vitrine válida
        run: |
          git config user.name "Grupo G3 Vitrines"
          git config user.email "actions@users.noreply.github.com"
          git add boloes.json
          if ! git diff --cached --quiet; then
            git commit -m "Atualiza vitrines de bolões"
            git push
          fi
